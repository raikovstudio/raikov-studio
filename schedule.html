<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Project • Raikov Studio</title>

<link rel="stylesheet" href="schedule.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="left">

<img src="images/raikov2.jpg" alt="Raikov">

</div>

<div class="right">

<h1>Schedule a Project</h1>

<p class="subtitle">
Fill in the information below.
</p>

<form>

<label>Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Project Type</label>

<select>

<option>YouTube Video</option>
<option>Short Form</option>
<option>Gaming</option>
<option>Documentary</option>
<option>Other</option>

</select>

<label>Budget</label>

<div class="budget">

<input type="number" placeholder="0">

<select>

<option>USD $</option>
<option>EUR €</option>
<option>GBP £</option>
<option>CHF Fr</option>
<option>AUD $</option>
<option>CAD $</option>

</select>

</div>

<label>Description</label>

<textarea rows="6"></textarea>

<button type="submit">

Send Request

</button>

</form>

<a class="back" href="index.html">

← Back to Home

</a>

</div>

</div>

</body>

</html>
