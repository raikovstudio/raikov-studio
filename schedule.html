<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Project • Raikov Studio</title>

<link rel="stylesheet" href="schedule.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="left">

        <img src="images/raikov-full.jpg" alt="Raikov">

    </div>

    <div class="right">

        <h1>Schedule a Project</h1>

        <p class="subtitle">
            Fill in the information below.
        </p>

        <form id="projectForm" novalidate>

            <label for="name">Name</label>
            <input
                type="text"
                id="name"
                name="name"
                required
            >

            <small class="error"></small>

            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                required
            >

            <small class="error"></small>

            <label for="project">Project Type</label>

            <select
                id="project"
                name="project"
                required
            >

                <option value="">Choose one...</option>
                <option>YouTube Video</option>
                <option>Short Form</option>
                <option>Gaming</option>
                <option>Documentary</option>
                <option>Other</option>

            </select>

            <small class="error"></small>

            <label>Budget</label>

            <div class="budget">

                <input
                    type="number"
                    id="budget"
                    name="budget"
                    placeholder="0"
                    required
                >

                <select
                    id="currency"
                    name="currency"
                    required
                >

                    <option>USD $</option>
                    <option>EUR €</option>
                    <option>GBP £</option>
                    <option>CHF Fr</option>
                    <option>CAD $</option>
                    <option>AUD $</option>

                </select>

            </div>

            <small class="error"></small>

            <label for="description">Description</label>

            <textarea
                id="description"
                name="description"
                rows="6"
                required
            ></textarea>

            <small class="error"></small>

            <label for="files">Attachments</label>

            <input
                type="file"
                id="files"
                name="files"
                multiple
                accept=".mp4,.mov,.avi,.mkv,.png,.jpg,.jpeg,.zip,.rar,.7z,.psd,.aep"
            >

            <small class="upload-text">
                You can attach videos, images, ZIP, PSD or After Effects files.
            </small>

            <button type="submit">

                Send Request

            </button>

        </form>

        <a class="back" href="index.html">

            ← Back to Home

        </a>

    </div>

</div>

<script src="schedule.js"></script>

</body>

</html>
